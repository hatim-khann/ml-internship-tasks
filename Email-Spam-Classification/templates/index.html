<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpamShield • Email Spam Classifier</title>
    <meta name="description" content="Professional email spam detection demo using TF‑IDF + Logistic Regression." />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <style>
      :root {
        --accent: #4f8cff;
        --accent-2: #17d4ff;
        --bg-0: #0b1020;
        --bg-1: #0f1733;
        --border: rgba(255, 255, 255, 0.12);
      }

      body {
        background: radial-gradient(1000px 600px at 10% 10%, rgba(79, 140, 255, 0.25), transparent 55%),
          radial-gradient(900px 650px at 90% 15%, rgba(23, 212, 255, 0.18), transparent 60%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
        min-height: 100vh;
      }

      .navbar-blur {
        backdrop-filter: blur(10px);
        background: rgba(11, 16, 32, 0.75);
        border-bottom: 1px solid var(--border);
      }

      .hero {
        border: 1px solid var(--border);
        background: linear-gradient(135deg, rgba(79, 140, 255, 0.14), rgba(23, 212, 255, 0.06));
      }

      .card-soft {
        border: 1px solid var(--border);
        background: rgba(15, 23, 51, 0.65);
      }

      .accent {
        color: var(--accent);
      }

      .btn-accent {
        background: linear-gradient(135deg, rgba(79, 140, 255, 0.9), rgba(23, 212, 255, 0.85));
        border: none;
      }

      .btn-accent:hover {
        filter: brightness(1.05);
      }

      .form-control,
      .form-select {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background-color: rgba(11, 16, 32, 0.55);
      }

      .form-control:focus,
      .form-select:focus {
        border-color: rgba(79, 140, 255, 0.65);
        box-shadow: 0 0 0 0.25rem rgba(79, 140, 255, 0.16);
      }

      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.9em;
        padding: 0.1rem 0.35rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-bottom-color: rgba(255, 255, 255, 0.28);
        border-radius: 0.35rem;
        background: rgba(11, 16, 32, 0.6);
      }

      .status-dot {
        width: 0.7rem;
        height: 0.7rem;
        border-radius: 50%;
        display: inline-block;
        margin-right: 0.45rem;
      }

      .dot-ok {
        background: #2bd576;
      }

      .dot-bad {
        background: #ff5c7a;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      footer {
        border-top: 1px solid var(--border);
        background: rgba(11, 16, 32, 0.55);
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-blur sticky-top">
      <div class="container py-2">
        <a class="navbar-brand fw-semibold" href="#">
          <span class="accent">SpamShield</span>
          <span class="text-secondary">/</span>
          <span class="text-body">Classifier</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#analyze">Analyze</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <section class="hero rounded-4 p-4 p-lg-5 mb-4">
        <div class="row align-items-center g-4">
          <div class="col-12">
            <h1 class="display-6 fw-semibold mb-2">Email spam detection</h1>
            <p class="text-secondary mb-3">
              Paste a message, subject + body, or an entire raw email to classify it as <span class="fw-semibold">Spam</span> or <span class="fw-semibold">Not Spam</span>.
            </p>
          </div>
        </div>
      </section>

      <section id="analyze" class="row g-4">
        <div class="col-lg-7">
          <div class="card card-soft rounded-4">
            <div class="card-body p-4">
              <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
                <h2 class="h5 mb-0">Analyze an email</h2>
              </div>

              <ul class="nav nav-pills mt-3" id="inputTabs" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="tab-text" data-bs-toggle="pill" data-bs-target="#pane-text" type="button" role="tab" aria-controls="pane-text" aria-selected="true">Quick Text</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-sb" data-bs-toggle="pill" data-bs-target="#pane-sb" type="button" role="tab" aria-controls="pane-sb" aria-selected="false">Subject + Body</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-raw" data-bs-toggle="pill" data-bs-target="#pane-raw" type="button" role="tab" aria-controls="pane-raw" aria-selected="false">Raw Email</button>
                </li>
              </ul>

              <div class="tab-content pt-3" id="inputTabsContent">
                <div class="tab-pane fade show active" id="pane-text" role="tabpanel" aria-labelledby="tab-text" tabindex="0">
                  <label class="form-label text-secondary">Email text</label>
                  <textarea id="textInput" class="form-control" rows="7" placeholder="Paste email content or message text here…"></textarea>
                  <div class="d-flex justify-content-between align-items-center mt-2">
                    <div></div>
                    <button class="btn btn-outline-secondary btn-sm" type="button" id="btnExampleText">Use example</button>
                  </div>
                </div>

                <div class="tab-pane fade" id="pane-sb" role="tabpanel" aria-labelledby="tab-sb" tabindex="0">
                  <div class="row g-3">
                    <div class="col-12">
                      <label class="form-label text-secondary">Subject</label>
                      <input id="subjectInput" class="form-control" placeholder="e.g., Your account has been selected" />
                    </div>
                    <div class="col-12">
                      <label class="form-label text-secondary">Body</label>
                      <textarea id="bodyInput" class="form-control" rows="6" placeholder="Paste the email body here…"></textarea>
                    </div>
                  </div>
                  <div class="d-flex justify-content-between align-items-center mt-2">
                    <div></div>
                    <button class="btn btn-outline-secondary btn-sm" type="button" id="btnExampleSB">Use example</button>
                  </div>
                </div>

                <div class="tab-pane fade" id="pane-raw" role="tabpanel" aria-labelledby="tab-raw" tabindex="0">
                  <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label text-secondary mb-2">Raw email (headers + body)</label>
                    <div></div>
                  </div>
                  <input id="rawFile" class="form-control" type="file" accept=".txt,.eml,.msg,text/plain,message/rfc822" />
                  <textarea id="rawEmailInput" class="form-control mt-3" rows="8" placeholder="Paste the full email content here (including headers, if you have them)…"></textarea>
                  <div class="d-flex justify-content-end mt-2">
                    <button class="btn btn-outline-secondary btn-sm" type="button" id="btnExampleRaw">Use example</button>
                  </div>
                </div>
              </div>

              <div class="d-grid d-sm-flex gap-2 mt-4">
                <button id="btnAnalyze" class="btn btn-accent btn-lg flex-sm-grow-1" type="button">Analyze</button>
                <button id="btnClear" class="btn btn-outline-secondary btn-lg" type="button">Clear</button>
              </div>

              <div id="errorBox" class="alert alert-danger mt-3 d-none" role="alert"></div>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card card-soft rounded-4 h-100">
            <div class="card-body p-4">
              <div class="d-flex align-items-center justify-content-between">
                <h2 class="h5 mb-0">Result</h2>
                <span id="resultBadge" class="badge text-bg-secondary">Waiting</span>
              </div>

              <div class="mt-3">
                <div class="small text-secondary">Classification</div>
                <div id="resultLabel" class="h3 fw-semibold mb-1">—</div>
                <div class="text-secondary" id="resultMeta"></div>
              </div>

              <hr class="border-opacity-25 my-4" />

              <div>
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <div class="small text-secondary">Spam probability</div>
                  <div id="probText" class="small text-secondary">—</div>
                </div>
                <div class="progress" role="progressbar" aria-label="Spam probability" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="height: 10px">
                  <div id="probBar" class="progress-bar" style="width: 0%"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-4">
      <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div class="text-secondary small">© <span id="year"></span> SpamShield — Arc Internship Assignment</div>
        <div class="small text-secondary">Built with Flask + Bootstrap</div>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      const $ = (id) => document.getElementById(id);

      const state = {
        activePaneId: "pane-text",
        busy: false,
      };

      function setBusy(isBusy) {
        state.busy = isBusy;
        $("btnAnalyze").disabled = isBusy;
        $("btnClear").disabled = isBusy;
        $("btnAnalyze").textContent = isBusy ? "Analyzing…" : "Analyze";
      }

      function showError(message) {
        const box = $("errorBox");
        box.textContent = message;
        box.classList.remove("d-none");
      }

      function clearError() {
        const box = $("errorBox");
        box.textContent = "";
        box.classList.add("d-none");
      }

      function clearInputs() {
        $("textInput").value = "";
        $("subjectInput").value = "";
        $("bodyInput").value = "";
        $("rawEmailInput").value = "";
        $("rawFile").value = "";
      }

      function setResultNeutral() {
        $("resultBadge").className = "badge text-bg-secondary";
        $("resultBadge").textContent = "Waiting";
        $("resultLabel").textContent = "—";
        $("resultMeta").textContent = "";
        $("probText").textContent = "—";
        $("probBar").style.width = "0%";
        $("probBar").className = "progress-bar";
      }

      function setResult(data) {
        const isSpam = !!data.isSpam;
        const label = data.label || (isSpam ? "Spam" : "Not Spam");
        const prob = typeof data.spamProbability === "number" ? data.spamProbability : null;

        $("resultLabel").textContent = label;
        $("resultMeta").textContent = "";

        if (isSpam) {
          $("resultBadge").className = "badge text-bg-danger";
          $("resultBadge").textContent = "Spam";
        } else {
          $("resultBadge").className = "badge text-bg-success";
          $("resultBadge").textContent = "Not Spam";
        }

        if (prob === null) {
          $("probText").textContent = "N/A";
          $("probBar").style.width = "0%";
          $("probBar").className = "progress-bar";
          return;
        }

        const pct = Math.max(0, Math.min(100, Math.round(prob * 100)));
        $("probText").textContent = `${pct}%`;
        $("probBar").style.width = `${pct}%`;
        $("probBar").className = isSpam ? "progress-bar bg-danger" : "progress-bar bg-success";
      }

      function getActivePayload() {
        const active = document.querySelector(".tab-pane.active");
        const activeId = active?.id || "pane-text";

        if (activeId === "pane-raw") {
          return { rawEmail: $("rawEmailInput").value };
        }

        if (activeId === "pane-sb") {
          return { subject: $("subjectInput").value, body: $("bodyInput").value };
        }

        return { text: $("textInput").value };
      }

      async function checkHealth() {
        // intentionally minimal UI (no status panel)
      }

      async function analyze() {
        clearError();
        setBusy(true);

        try {
          const payload = getActivePayload();
          const res = await fetch("/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          if (!res.ok) {
            showError(data?.error || "Request failed.");
            return;
          }

          setResult(data);
        } catch (e) {
          showError("Could not reach the server. Make sure Flask is running, then refresh.");
        } finally {
          setBusy(false);
          checkHealth();
        }
      }

      $("btnAnalyze").addEventListener("click", analyze);
      $("btnClear").addEventListener("click", () => {
        clearError();
        clearInputs();
        setResultNeutral();
      });

      $("btnExampleText").addEventListener("click", () => {
        $("textInput").value = "Congratulations! You have been selected to receive a FREE gift card. Click the link to claim now.";
      });

      $("btnExampleSB").addEventListener("click", () => {
        $("subjectInput").value = "Urgent: Verify your account";
        $("bodyInput").value = "We noticed unusual activity. Verify your account immediately to avoid suspension.\n\nVisit: http://example.com/verify";
      });

      $("btnExampleRaw").addEventListener("click", () => {
        $("rawEmailInput").value =
          "From: promotions@somebrand.example\n" +
          "To: you@example.com\n" +
          "Subject: You won a prize\n" +
          "\n" +
          "Claim your prize now. Limited time offer!";
      });

      $("rawFile").addEventListener("change", async (ev) => {
        const file = ev.target.files?.[0];
        if (!file) return;

        try {
          const text = await file.text();
          $("rawEmailInput").value = text;
        } catch (e) {
          showError("Could not read the file. Try a plain text or .eml file.");
        }
      });

      document.addEventListener("keydown", (ev) => {
        if ((ev.ctrlKey || ev.metaKey) && ev.key === "Enter") {
          ev.preventDefault();
          analyze();
        }
      });

      $("year").textContent = new Date().getFullYear();
      setResultNeutral();
      checkHealth();
    </script>
  </body>
</html>

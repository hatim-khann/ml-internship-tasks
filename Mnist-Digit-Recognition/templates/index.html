<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DigitVision • MNIST Recognizer</title>
    <meta name="description" content="Professional MNIST digit recognition UI." />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <style>
      :root {
        --accent: #4f8cff;
        --accent-2: #17d4ff;
        --bg-0: #0b1020;
        --bg-1: #0f1733;
        --border: rgba(255, 255, 255, 0.12);
      }

      body {
        background: radial-gradient(1000px 600px at 10% 10%, rgba(79, 140, 255, 0.25), transparent 55%),
          radial-gradient(900px 650px at 90% 15%, rgba(23, 212, 255, 0.18), transparent 60%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
        min-height: 100vh;
      }

      .navbar-blur {
        backdrop-filter: blur(10px);
        background: rgba(11, 16, 32, 0.75);
        border-bottom: 1px solid var(--border);
      }

      .panel {
        border: 1px solid var(--border);
        background: rgba(15, 23, 51, 0.65);
      }

      .hero {
        border: 1px solid var(--border);
        background: linear-gradient(135deg, rgba(79, 140, 255, 0.14), rgba(23, 212, 255, 0.06));
      }

      .accent {
        color: var(--accent);
      }

      .btn-accent {
        background: linear-gradient(135deg, rgba(79, 140, 255, 0.9), rgba(23, 212, 255, 0.85));
        border: none;
      }

      .btn-accent:hover {
        filter: brightness(1.05);
      }

      .dropzone {
        border: 1px dashed rgba(255, 255, 255, 0.25);
        border-radius: 1rem;
        background: rgba(11, 16, 32, 0.45);
        padding: 1.25rem;
        transition: border-color 120ms ease, background 120ms ease;
      }

      .dropzone.dragover {
        border-color: rgba(23, 212, 255, 0.85);
        background: rgba(23, 212, 255, 0.08);
      }

      .preview {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.9rem;
        background: rgba(11, 16, 32, 0.45);
        overflow: hidden;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      footer {
        border-top: 1px solid var(--border);
        background: rgba(11, 16, 32, 0.55);
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-blur sticky-top">
      <div class="container py-2">
        <a class="navbar-brand fw-semibold" href="#">
          <span class="accent">DigitVision</span>
          <span class="text-secondary">/</span>
          <span class="text-body">Recognizer</span>
        </a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <section class="hero rounded-4 p-4 p-lg-5 mb-4">
        <h1 class="display-6 fw-semibold mb-2">MNIST digit recognition</h1>
        <p class="text-secondary mb-0">Upload an image to recognize the digit (0–9) with a confidence score.</p>
      </section>

      <section class="row g-4 align-items-stretch">
        <div class="col-lg-7">
          <div class="panel rounded-4 p-4 h-100">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <h2 class="h5 mb-0">Input image</h2>
            </div>

            <div id="dropzone" class="dropzone mt-3" tabindex="0" aria-label="Dropzone">
              <div class="row g-3 align-items-center">
                <div class="col-md-7">
                  <div class="fw-semibold">Drop an image here</div>
                  <div class="text-secondary small">Or choose a file.</div>
                </div>
                <div class="col-md-5">
                  <input id="fileInput" class="form-control" type="file" accept="image/*" />
                </div>
              </div>
            </div>

            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <div class="preview ratio ratio-1x1">
                  <img id="previewImg" alt="Image preview" />
                </div>
              </div>
              <div class="col-md-6">
                <div class="d-flex flex-column h-100">
                  <div class="text-secondary small">Selected</div>
                  <div id="fileMeta" class="fw-semibold mb-3">—</div>

                  <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

                  <div class="mt-auto d-grid gap-2">
                    <button id="btnPredict" class="btn btn-accent btn-lg" type="button" disabled>Recognize</button>
                    <button id="btnClear" class="btn btn-outline-secondary btn-lg" type="button" disabled>Clear</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="panel rounded-4 p-4 h-100">
            <div class="d-flex justify-content-between align-items-center">
              <h2 class="h5 mb-0">Result</h2>
              <span id="statusBadge" class="badge text-bg-secondary">Waiting</span>
            </div>

            <div class="mt-3">
              <div class="text-secondary small">Predicted digit</div>
              <div id="digit" class="display-3 fw-semibold mb-1">—</div>
              <div class="text-secondary" id="confidence">—</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-4">
      <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div class="text-secondary small">© <span id="year"></span> DigitVision — Arc Internship Assignment</div>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      const $ = (id) => document.getElementById(id);

      let selectedFile = null;
      let busy = false;

      function setBusy(v) {
        busy = v;
        $("btnPredict").disabled = v || !selectedFile;
        $("btnClear").disabled = v || !selectedFile;
        $("btnPredict").textContent = v ? "Recognizing…" : "Recognize";
      }

      function showError(msg) {
        const box = $("errorBox");
        box.textContent = msg;
        box.classList.remove("d-none");
      }

      function clearError() {
        const box = $("errorBox");
        box.textContent = "";
        box.classList.add("d-none");
      }

      function setWaiting() {
        $("statusBadge").className = "badge text-bg-secondary";
        $("statusBadge").textContent = "Waiting";
        $("digit").textContent = "—";
        $("confidence").textContent = "—";
      }

      function setResult(data) {
        const digit = data?.digit;
        const conf = typeof data?.confidence === "number" ? data.confidence : null;

        $("statusBadge").className = "badge text-bg-success";
        $("statusBadge").textContent = "Done";

        $("digit").textContent = typeof digit === "number" ? String(digit) : "—";
        $("confidence").textContent = conf === null ? "" : `Confidence: ${(conf * 100).toFixed(1)}%`;
      }

      function setFile(file) {
        selectedFile = file;
        clearError();
        setWaiting();

        if (!file) {
          $("fileMeta").textContent = "—";
          $("previewImg").removeAttribute("src");
          setBusy(false);
          return;
        }

        $("fileMeta").textContent = `${file.name} (${Math.round(file.size / 1024)} KB)`;

        const url = URL.createObjectURL(file);
        $("previewImg").src = url;

        setBusy(false);
      }

      async function predict() {
        if (!selectedFile || busy) return;

        clearError();
        setBusy(true);
        $("statusBadge").className = "badge text-bg-secondary";
        $("statusBadge").textContent = "Processing";

        try {
          const form = new FormData();
          form.append("image", selectedFile, selectedFile.name);

          const res = await fetch("/api/predict", { method: "POST", body: form });
          const data = await res.json();

          if (!res.ok) {
            showError(data?.error || "Request failed.");
            $("statusBadge").className = "badge text-bg-danger";
            $("statusBadge").textContent = "Error";
            return;
          }

          setResult(data);
        } catch (e) {
          showError("Could not reach the server.");
          $("statusBadge").className = "badge text-bg-danger";
          $("statusBadge").textContent = "Error";
        } finally {
          setBusy(false);
        }
      }

      function clearAll() {
        $("fileInput").value = "";
        selectedFile = null;
        clearError();
        setWaiting();
        $("fileMeta").textContent = "—";
        $("previewImg").removeAttribute("src");
        setBusy(false);
      }

      // UI bindings
      $("btnPredict").addEventListener("click", predict);
      $("btnClear").addEventListener("click", clearAll);

      $("fileInput").addEventListener("change", (ev) => {
        const f = ev.target.files?.[0] || null;
        setFile(f);
      });

      // Drag & drop
      const dz = $("dropzone");
      dz.addEventListener("dragover", (ev) => {
        ev.preventDefault();
        dz.classList.add("dragover");
      });
      dz.addEventListener("dragleave", () => dz.classList.remove("dragover"));
      dz.addEventListener("drop", (ev) => {
        ev.preventDefault();
        dz.classList.remove("dragover");
        const f = ev.dataTransfer?.files?.[0] || null;
        if (f) setFile(f);
      });

      // Paste image
      document.addEventListener("paste", (ev) => {
        const items = ev.clipboardData?.items;
        if (!items) return;

        for (const item of items) {
          if (item.type && item.type.startsWith("image/")) {
            const blob = item.getAsFile();
            if (blob) {
              const file = new File([blob], "pasted-image.png", { type: blob.type });
              setFile(file);
              ev.preventDefault();
              break;
            }
          }
        }
      });

      // Keyboard: Ctrl+Enter to run
      document.addEventListener("keydown", (ev) => {
        if ((ev.ctrlKey || ev.metaKey) && ev.key === "Enter") {
          ev.preventDefault();
          predict();
        }
      });

      // Init
      $("year").textContent = new Date().getFullYear();
      setWaiting();
      setBusy(false);
    </script>
  </body>
</html>
